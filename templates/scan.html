<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Scan Student QR</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

    <!-- html5-qrcode -->

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body{

            background:#f5f5f5;

        }

        #reader{

            width:500px;

            margin:auto;

        }

        #reader video{

            width:100% !important;

            border-radius:15px;

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white text-center">

            <h2>

                <i class="bi bi-camera-fill"></i>

                Scan Student QR Code

            </h2>

        </div>

        <div class="card-body">

            <p class="text-center text-muted">

                Select a camera and click Start Scanner.

            </p>

            <!-- Status -->

            <div

                id="status"

                class="alert alert-primary text-center">

                Waiting...

            </div>

            <!-- Camera Selection -->

            <div class="mb-3">

                <label class="form-label fw-bold">

                    Select Camera

                </label>

                <select

                    id="cameraSelect"

                    class="form-select">

                </select>

            </div>

            <!-- Start Button -->

            <div class="text-center mb-3">

                <button

                    id="startBtn"

                    class="btn btn-success">

                    ▶️ Start Scanner

                </button>

            </div>

            <!-- QR Reader -->

            <div id="reader"></div>

            <br>

            <!-- Buttons -->

            <div class="text-center">

                <button

                    class="btn btn-danger"

                    onclick="stopScanner()">

                    Stop Camera

                </button>

                <button

                    class="btn btn-warning"

                    onclick="restartScanner()">

                    Restart

                </button>

                <a

                    href="/"

                    class="btn btn-secondary">

                    Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<script>

let scanner = new Html5Qrcode("reader");

let lastScan = "";

let started = false;

/* ---------------------------------- */
/* Load Cameras */
/* ---------------------------------- */

Html5Qrcode.getCameras()

.then(cameras => {

    const select =

        document.getElementById("cameraSelect");

    cameras.forEach(camera => {

        const option =

            document.createElement("option");

        option.value = camera.id;

        option.text = camera.label;

        select.appendChild(option);

    });

    // Restore previous camera

    const saved =

        localStorage.getItem("preferredCamera");

    if(saved){

        select.value = saved;

    }

    else{

        // Prefer non-virtual camera

        const real = cameras.find(cam =>

            !cam.label.toLowerCase().includes("virtual") &&

            !cam.label.toLowerCase().includes("oppo") &&

            !cam.label.toLowerCase().includes("obs")

        );

        if(real){

            select.value = real.id;

        }

    }

})

.catch(err=>{

    alert(err);

});

/* ---------------------------------- */
/* QR Success */
/* ---------------------------------- */

async function onScanSuccess(decodedText){

    if(decodedText === lastScan){
        return;
    }

    lastScan = decodedText;

    try{

        const response = await fetch(
            "/api/mark_attendance/" +
            encodeURIComponent(decodedText)
        );

        const result = await response.json();

        const status = document.getElementById("status");

        if(result.success){

            status.className = "alert alert-success";
            status.innerHTML = "✅ " + result.message;

        }else{

            status.className = "alert alert-warning";
            status.innerHTML = "⚠️ " + result.message;

        }

        new Audio(
            "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
        ).play();

        setTimeout(() => {

            lastScan = "";

            status.className = "alert alert-primary";
            status.innerHTML = "Waiting for QR Code...";

        }, 2000);

    }
    catch(err){

        console.log(err);

        document.getElementById("status").className =
            "alert alert-danger";

        document.getElementById("status").innerHTML =
            "Server Error";

    }

}

/* ---------------------------------- */
/* Start Scanner */
/* ---------------------------------- */

async function startScanner(){

    if(started){

        return;

    }

    const cameraId=

    document.getElementById("cameraSelect").value;

    localStorage.setItem(

        "preferredCamera",

        cameraId

    );

    try{

        await scanner.start(

            cameraId,

            {

                 fps:5,

                 qrbox:250,

                 aspectRatio:1.0,

                disableFlip:false

            },

            onScanSuccess

        );

        started=true;

        document.getElementById("status").innerHTML=

        "Camera Started";

    }

    catch(err){

        document.getElementById("status").className=

        "alert alert-danger";

        document.getElementById("status").innerHTML=

        err;

    }

}

/* ---------------------------------- */
/* Stop */
/* ---------------------------------- */

async function stopScanner(){

    if(!started){

        return;

    }

    try{

        await scanner.stop();

        started=false;

        document.getElementById("status").className=

        "alert alert-secondary";

        document.getElementById("status").innerHTML=

        "Camera Stopped";

    }

    catch(e){}

}

/* ---------------------------------- */
/* Restart */
/* ---------------------------------- */

async function restartScanner(){

    if(started){

        await stopScanner();

    }

    startScanner();

}

/* ---------------------------------- */
/* Camera Change */
/* ---------------------------------- */

document

.getElementById("cameraSelect")

.addEventListener(

"change",

async function(){

    if(started){

        await stopScanner();

        startScanner();

    }

}

);

/* ---------------------------------- */
/* Start Button */
/* ---------------------------------- */

document

.getElementById("startBtn")

.addEventListener(

"click",

startScanner

);

</script>

</body>

</html>
