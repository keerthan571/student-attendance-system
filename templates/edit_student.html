<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h3>Edit Student</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Student Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        value="{{ student[1] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        USN

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="usn"
                        value="{{ student[2] }}"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Update Student

                </button>

                <a
                    href="/students"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
